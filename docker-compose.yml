version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  producer:
    build: ./docker/producer
    container_name: steam_producer
    depends_on:
      - kafka
    volumes:
      - C:/bigdata:/app/data
    environment:
      PYTHONUNBUFFERED: 1
      KAFKA_BROKER: kafka:29092
      TOPIC_NAME: steam-reviews
      CSV_FILE: /app/data/steam_reviews.csv
      MESSAGES_PER_SECOND: 50
    restart: on-failure

  spark-master:
    build: ./docker/spark
    container_name: spark_master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"   # Spark Web UI
      - "7077:7077"   # Spark Master port
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
    volumes:
      - C:/bigdata:/app/data
      - C:/bigdata/delta:/delta

  spark-worker:
    build: ./docker/spark
    container_name: spark_worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    volumes:
      - C:/bigdata:/app/data
      - C:/bigdata/delta:/delta

  spark-streaming:
    build: ./docker/spark
    container_name: spark_streaming
    command: >
      /opt/spark/bin/spark-submit
        --master spark://spark-master:7077
        --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.4.1,io.delta:delta-core_2.12:2.4.0
        --conf "spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension"
        --conf "spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog"
        /app/notebooks/step3_spark_streaming.py
    depends_on:
      - spark-master
      - kafka
    volumes:
      - C:/bigdata:/app/data
      - C:/bigdata/delta:/delta
      - ./notebooks:/app/notebooks
    environment:
      PYTHONUNBUFFERED: 1
      KAFKA_BROKER: kafka:29092
      TOPIC_NAME: steam-reviews
      DELTA_PATH: /delta
    restart: on-failure
